<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seat Map Library</title>
  <style>
    :root {
      --bg-top: #f4efe6;
      --bg-bottom: #dbe7f4;
      --panel: rgba(255, 252, 248, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(15, 23, 42, 0.12);
      --text: #162033;
      --muted: #5a6578;
      --accent: #be5b2c;
      --accent-dark: #8b401d;
      --shadow: 0 24px 60px rgba(22, 32, 51, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Pretendard Variable", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(190, 91, 44, 0.16), transparent 22%),
        radial-gradient(circle at right 16%, rgba(44, 95, 152, 0.16), transparent 24%),
        linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
      padding: 24px;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      align-items: start;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 0.96;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      max-width: 620px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    a.button,
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    a.button:hover,
    button:hover {
      transform: translateY(-1px);
    }

    .button.primary,
    button.primary {
      color: #fffaf3;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      box-shadow: 0 12px 24px rgba(139, 64, 29, 0.2);
    }

    .button.secondary,
    button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
    }

    .auth-card {
      padding: 18px;
      border-radius: 22px;
      background: var(--panel-strong);
      border: 1px solid rgba(15, 23, 42, 0.08);
      display: grid;
      gap: 12px;
    }

    .auth-card h2 {
      margin: 0;
      font-size: 18px;
    }

    .auth-card.is-authenticated .login-only {
      display: none;
    }

    .auth-card:not(.is-authenticated) .auth-only {
      display: none;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      border: 1px solid rgba(15, 23, 42, 0.14);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      background: #fffdf9;
      color: var(--text);
    }

    .auth-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .status,
    .empty,
    .meta {
      font-size: 13px;
      color: var(--muted);
    }

    .panel {
      padding: 24px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 24px;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .card {
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(15, 23, 42, 0.08);
      display: grid;
      gap: 10px;
      min-height: 190px;
    }

    .card h3 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(22, 32, 51, 0.06);
      color: var(--text);
    }

    .card-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    @media (max-width: 860px) {
      body {
        padding: 16px;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 22px;
      }

      .panel {
        padding: 18px;
      }

      .panel-head {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <h1>Seatmaps for real classrooms.</h1>
        <p>Generator에서 만든 좌석 배치를 PocketBase에 저장하고, 여기서 바로 기존 배치를 다시 열어 수정할 수 있습니다.</p>
        <div class="hero-actions">
          <a class="button primary" href="./generator.html">새 seatmap 만들기</a>
          <button class="secondary" id="refreshButton" type="button">목록 새로고침</button>
        </div>
      </div>

      <section class="auth-card" aria-label="PocketBase 로그인">
        <h2>로그인</h2>
        <div class="login-only">
          <div class="field">
            <label for="emailInput">이메일</label>
            <input id="emailInput" type="email" placeholder="you@example.com">
          </div>
          <div class="field">
            <label for="passwordInput">비밀번호</label>
            <input id="passwordInput" type="password" placeholder="비밀번호">
          </div>
          <div class="auth-actions">
            <button class="primary" id="loginButton" type="button">로그인</button>
          </div>
        </div>
        <div class="auth-actions auth-only">
          <button class="secondary" id="logoutButton" type="button">로그아웃</button>
        </div>
        <div class="status" id="authStatus">로그인하면 저장된 seatmap 목록이 표시됩니다.</div>
      </section>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>저장된 seatmaps</h2>
          <div class="meta" id="listMeta">로그인 전입니다.</div>
        </div>
        <a class="button secondary" href="./generator.html">Generator로 이동</a>
      </div>
      <div class="list" id="seatmapList"></div>
      <div class="empty" id="emptyState">저장된 seatmap이 없습니다.</div>
    </section>
  </main>

  <script src="./seatmap-app.js"></script>
  <script>
    const ui = {
      authCard: document.querySelector(".auth-card"),
      authStatus: document.getElementById("authStatus"),
      emailInput: document.getElementById("emailInput"),
      passwordInput: document.getElementById("passwordInput"),
      loginButton: document.getElementById("loginButton"),
      logoutButton: document.getElementById("logoutButton"),
      refreshButton: document.getElementById("refreshButton"),
      listMeta: document.getElementById("listMeta"),
      seatmapList: document.getElementById("seatmapList"),
      emptyState: document.getElementById("emptyState")
    };

    function setAuthMessage(message) {
      ui.authStatus.textContent = message;
    }

    function setAuthUi(auth) {
      ui.authCard.classList.toggle("is-authenticated", Boolean(auth));
    }

    function renderList(items) {
      ui.seatmapList.innerHTML = "";
      ui.emptyState.hidden = items.length > 0;

      items.forEach((item) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <h3>${item.title}</h3>
          <div class="chip-row">
            <span class="chip">${item.rowCount || 0} rows</span>
            <span class="chip">${item.seatCount || 0} seats</span>
          </div>
          <div class="meta">수정: ${item.updatedAt || item.createdAt || item.updated || item.created ? SeatmapApp.formatDate(item.updatedAt || item.createdAt || item.updated || item.created) : "시간 정보 없음"}</div>
          <div class="card-actions">
            <div class="status">record id: ${item.id}</div>
            <a class="button primary" href="./generator.html?id=${encodeURIComponent(item.id)}">열기</a>
          </div>
        `;
        ui.seatmapList.appendChild(card);
      });
    }

    async function refreshList() {
      const auth = SeatmapApp.getStoredAuth();
      if (!auth) {
        setAuthUi(null);
        ui.listMeta.textContent = "로그인 후 개인 seatmap 목록을 볼 수 있습니다.";
        renderList([]);
        setAuthMessage("로그인하면 저장된 seatmap 목록이 표시됩니다.");
        return;
      }

      setAuthUi(auth);
      const result = await SeatmapApp.listSeatmaps();
      const items = result.items || [];
      ui.listMeta.textContent = `${auth.record.email} 계정으로 ${items.length}개의 seatmap을 조회했습니다.`;
      renderList(items);
      setAuthMessage(`${auth.record.email} 계정으로 로그인되어 있습니다.`);
    }

    ui.loginButton.addEventListener("click", async () => {
      try {
        const auth = await SeatmapApp.login(ui.emailInput.value.trim(), ui.passwordInput.value);
        setAuthUi(auth);
        setAuthMessage(`${auth.record.email} 계정으로 로그인되었습니다.`);
        await refreshList();
      } catch (error) {
        setAuthMessage(error.message || "로그인에 실패했습니다.");
      }
    });

    ui.logoutButton.addEventListener("click", () => {
      SeatmapApp.logout();
      setAuthUi(null);
      renderList([]);
      ui.listMeta.textContent = "로그인 전입니다.";
      setAuthMessage("로그아웃했습니다.");
    });

    ui.refreshButton.addEventListener("click", async () => {
      try {
        await refreshList();
      } catch (error) {
        setAuthMessage(error.message || "목록을 새로고침하지 못했습니다.");
      }
    });

    (async () => {
      try {
        const auth = await SeatmapApp.verifyAuth();
        setAuthUi(auth);
        await refreshList();
      } catch (error) {
        setAuthUi(null);
        setAuthMessage(error.message || "PocketBase 연결에 실패했습니다.");
      }
    })();
  </script>
</body>
</html>
