<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seat Map Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF9F7;
      --bg-elevated: #FFFFFF;
      --fg: #1A1A1A;
      --fg-muted: #6B6B6B;
      --fg-subtle: #9A9A9A;
      --accent: #C45D35;
      --accent-hover: #A84D2B;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.12);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
      padding: 48px 24px;
    }

    /* Subtle grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: -1;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    /* Hero Section */
    .hero {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 48px;
      align-items: start;
      animation: slideUp 0.6s ease-out both;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--fg);
    }

    .hero p {
      font-size: 1.0625rem;
      color: var(--fg-muted);
      max-width: 520px;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-secondary {
      background-color: var(--bg-elevated);
      color: var(--fg);
      border-color: var(--border-strong);
    }

    .btn-secondary:hover {
      background-color: #F5F5F5;
      border-color: rgba(0, 0, 0, 0.2);
    }

    /* Auth Card */
    .auth-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.6s ease-out 0.1s both;
    }

    .auth-card h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--fg);
    }

    .auth-card.is-authenticated .login-only {
      display: none;
    }

    .auth-card:not(.is-authenticated) .auth-only {
      display: none;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--fg-muted);
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--fg);
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input::placeholder {
      color: var(--fg-subtle);
    }

    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 93, 53, 0.1);
    }

    .auth-actions {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .auth-actions .btn {
      flex: 1;
    }

    .status {
      font-size: 0.8125rem;
      color: var(--fg-muted);
      margin-top: 16px;
      line-height: 1.6;
    }

    /* Panel Section */
    .panel {
      animation: slideUp 0.6s ease-out 0.2s both;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
      gap: 24px;
    }

    .panel-title {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--fg);
    }

    .meta {
      font-size: 0.875rem;
      color: var(--fg-muted);
    }

    /* Seatmap Grid */
    .list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-sm);
    }

    .card h3 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: -0.01em;
    }

    .chip-row {
      display: flex;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--fg-muted);
      background: var(--bg);
      border-radius: var(--radius-full);
    }

    .card-meta {
      font-size: 0.8125rem;
      color: var(--fg-subtle);
    }

    .card-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 8px;
    }

    .card-actions .status {
      margin: 0;
    }

    .card-actions .btn {
      padding: 10px 16px;
      font-size: 0.875rem;
    }

    .empty {
      text-align: center;
      padding: 64px 24px;
      color: var(--fg-muted);
      font-size: 0.9375rem;
      background: var(--bg-elevated);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-md);
    }

    /* Animations */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .auth-card {
        max-width: 400px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 24px 16px;
      }

      .page {
        gap: 32px;
      }

      .hero-actions {
        flex-direction: column;
      }

      .hero-actions .btn {
        width: 100%;
      }

      .panel-head {
        flex-direction: column;
        gap: 16px;
      }

      .panel-head .btn {
        width: 100%;
      }

      .list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-content">
        <h1>Seatmaps for real classrooms.</h1>
        <p>Generator에서 만든 좌석 배치를 PocketBase에 저장하고, 여기서 바로 기존 배치를 다시 열어 수정할 수 있습니다.</p>
        <div class="hero-actions">
          <a class="btn btn-primary" href="./generator.html">새 seatmap 만들기</a>
          <button class="btn btn-secondary" id="refreshButton" type="button">목록 새로고침</button>
        </div>
      </div>

      <section class="auth-card" aria-label="PocketBase 로그인">
        <h2>로그인</h2>
        <div class="login-only">
          <div class="field">
            <label for="emailInput">이메일</label>
            <input id="emailInput" type="email" placeholder="you@example.com">
          </div>
          <div class="field">
            <label for="passwordInput">비밀번호</label>
            <input id="passwordInput" type="password" placeholder="비밀번호">
          </div>
          <div class="auth-actions">
            <button class="btn btn-primary" id="loginButton" type="button">로그인</button>
          </div>
        </div>
        <div class="auth-actions auth-only">
          <button class="btn btn-secondary" id="logoutButton" type="button">로그아웃</button>
        </div>
        <div class="status" id="authStatus">로그인하면 저장된 seatmap 목록이 표시됩니다.</div>
      </section>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <h2>저장된 seatmaps</h2>
          <div class="meta" id="listMeta">로그인 전입니다.</div>
        </div>
        <a class="btn btn-secondary" href="./generator.html">Generator로 이동</a>
      </div>
      <div class="list" id="seatmapList"></div>
      <div class="empty" id="emptyState">저장된 seatmap이 없습니다.</div>
    </section>
  </main>

  <script src="./seatmap-app.js"></script>
  <script>
    const ui = {
      authCard: document.querySelector(".auth-card"),
      authStatus: document.getElementById("authStatus"),
      emailInput: document.getElementById("emailInput"),
      passwordInput: document.getElementById("passwordInput"),
      loginButton: document.getElementById("loginButton"),
      logoutButton: document.getElementById("logoutButton"),
      refreshButton: document.getElementById("refreshButton"),
      listMeta: document.getElementById("listMeta"),
      seatmapList: document.getElementById("seatmapList"),
      emptyState: document.getElementById("emptyState")
    };

    function setAuthMessage(message) {
      ui.authStatus.textContent = message;
    }

    function setAuthUi(auth) {
      ui.authCard.classList.toggle("is-authenticated", Boolean(auth));
    }

    function renderList(items) {
      ui.seatmapList.innerHTML = "";
      ui.emptyState.hidden = items.length > 0;

      items.forEach((item) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <h3>${item.title}</h3>
          <div class="chip-row">
            <span class="chip">${item.rowCount || 0} rows</span>
            <span class="chip">${item.seatCount || 0} seats</span>
          </div>
          <div class="card-meta">수정: ${item.updatedAt || item.createdAt || item.updated || item.created ? SeatmapApp.formatDate(item.updatedAt || item.createdAt || item.updated || item.created) : "시간 정보 없음"}</div>
          <div class="card-actions">
            <div class="status">record id: ${item.id}</div>
            <a class="btn btn-primary" href="./generator.html?id=${encodeURIComponent(item.id)}">열기</a>
          </div>
        `;
        ui.seatmapList.appendChild(card);
      });
    }

    async function refreshList() {
      const auth = SeatmapApp.getStoredAuth();
      if (!auth) {
        setAuthUi(null);
        ui.listMeta.textContent = "로그인 후 개인 seatmap 목록을 볼 수 있습니다.";
        renderList([]);
        setAuthMessage("로그인하면 저장된 seatmap 목록이 표시됩니다.");
        return;
      }

      setAuthUi(auth);
      const result = await SeatmapApp.listSeatmaps();
      const items = result.items || [];
      ui.listMeta.textContent = `${auth.record.email} 계정으로 ${items.length}개의 seatmap을 조회했습니다.`;
      renderList(items);
      setAuthMessage(`${auth.record.email} 계정으로 로그인되어 있습니다.`);
    }

    ui.loginButton.addEventListener("click", async () => {
      try {
        const auth = await SeatmapApp.login(ui.emailInput.value.trim(), ui.passwordInput.value);
        setAuthUi(auth);
        setAuthMessage(`${auth.record.email} 계정으로 로그인되었습니다.`);
        await refreshList();
      } catch (error) {
        setAuthMessage(error.message || "로그인에 실패했습니다.");
      }
    });

    ui.logoutButton.addEventListener("click", () => {
      SeatmapApp.logout();
      setAuthUi(null);
      renderList([]);
      ui.listMeta.textContent = "로그인 전입니다.";
      setAuthMessage("로그아웃했습니다.");
    });

    ui.refreshButton.addEventListener("click", async () => {
      try {
        await refreshList();
      } catch (error) {
        setAuthMessage(error.message || "목록을 새로고침하지 못했습니다.");
      }
    });

    (async () => {
      try {
        const auth = await SeatmapApp.verifyAuth();
        setAuthUi(auth);
        await refreshList();
      } catch (error) {
        setAuthUi(null);
        setAuthMessage(error.message || "PocketBase 연결에 실패했습니다.");
      }
    })();
  </script>
</body>
</html>
