<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seat Map Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper-width: 11.69in;
      --paper-height: 8.27in;
      --safe-margin: 0.6in;
      --aisle-width: 0.36in;
      --seat-width: 0.52in;
      --seat-height: 0.34in;
      --seat-gap: 0.04in;
      --row-gap: 0.27in;
      --bg: #FAF9F7;
      --bg-elevated: #FFFFFF;
      --fg: #1A1A1A;
      --fg-muted: #6B6B6B;
      --fg-subtle: #9A9A9A;
      --accent: #C45D35;
      --accent-hover: #A84D2B;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.12);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Subtle grid pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: -1;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 380px 1fr;
    }

    /* Sidebar Controls */
    .controls {
      padding: 32px 24px;
      border-right: 1px solid var(--border);
      background: var(--bg-elevated);
      overflow-y: auto;
      max-height: 100vh;
    }

    .controls-header {
      margin-bottom: 32px;
      animation: slideUp 0.5s ease-out both;
    }

    .controls h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .controls > p {
      font-size: 0.875rem;
      color: var(--fg-muted);
      line-height: 1.6;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Panels */
    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px;
      animation: slideUp 0.5s ease-out both;
    }

    .panel:nth-child(1) { animation-delay: 0.05s; }
    .panel:nth-child(2) { animation-delay: 0.1s; }
    .panel:nth-child(3) { animation-delay: 0.15s; }
    .panel:nth-child(4) { animation-delay: 0.2s; }

    .panel h2 {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .panel.is-authenticated .login-only {
      display: none;
    }

    .panel:not(.is-authenticated) .auth-only {
      display: none;
    }

    /* Form Elements */
    .field {
      margin-bottom: 16px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--fg-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--fg);
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--fg-subtle);
    }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 93, 53, 0.1);
    }

    .field textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.5;
    }

    .size-grid,
    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-primary:disabled {
      background-color: var(--fg-subtle);
      border-color: var(--fg-subtle);
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: var(--bg-elevated);
      color: var(--fg);
      border-color: var(--border-strong);
    }

    .btn-secondary:hover {
      background-color: #F5F5F5;
      border-color: rgba(0, 0, 0, 0.2);
    }

    .actions,
    .auth-actions,
    .top-links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .actions {
      grid-template-columns: 1fr 1fr;
    }

    .record-meta,
    .status {
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--fg-muted);
      line-height: 1.6;
      min-height: 0;
    }

    /* Preview Area */
    .preview-wrap {
      padding: 48px;
      overflow: auto;
      min-width: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .sheet {
      width: var(--paper-width);
      min-height: var(--paper-height);
      padding: var(--safe-margin);
      background: var(--bg-elevated);
      box-shadow: var(--shadow-lg);
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.6s ease-out 0.3s both;
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--fg);
    }

    .podium {
      align-self: center;
      width: 2.4in;
      height: 0.56in;
      margin-top: 0.26in;
      border: 2px solid var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      user-select: none;
      color: var(--fg);
    }

    .rows {
      margin-top: 0.42in;
      display: flex;
      flex-direction: column;
      gap: var(--row-gap);
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--aisle-width) minmax(0, 1fr);
      align-items: center;
      min-height: var(--seat-height);
    }

    .block {
      display: flex;
      gap: var(--seat-gap);
      min-width: 0;
    }

    .block.left {
      justify-content: flex-end;
    }

    .block.right {
      justify-content: flex-start;
    }

    .seat {
      width: var(--seat-width);
      height: var(--seat-height);
      border: 1px solid var(--fg);
      padding: 0 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 10px;
      line-height: 1;
      overflow: hidden;
      background: var(--bg-elevated);
      white-space: nowrap;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .seat:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(196, 93, 53, 0.2);
    }

    .seat:empty::before {
      content: "";
      display: inline-block;
      width: 100%;
      height: 1px;
    }

    /* Animations */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        border-right: 0;
        border-bottom: 1px solid var(--border);
        max-height: none;
        padding: 24px 20px;
      }

      .preview-wrap {
        width: 100%;
        padding: 24px 16px 28px;
        justify-content: flex-start;
        overflow-x: auto;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        scroll-padding-inline: 16px;
      }
    }

    @media (max-width: 640px) {
      .preview-wrap {
        padding: 16px 12px 20px;
        scroll-padding-inline: 12px;
      }
    }

    /* Print Styles */
    @page {
      size: A4 landscape;
      margin: 0;
    }

    @media print {
      body {
        background: var(--bg-elevated);
      }

      body::before {
        display: none;
      }

      .controls {
        display: none;
      }

      .layout {
        display: block;
      }

      .preview-wrap {
        padding: 0;
        overflow: visible;
      }

      .sheet {
        width: var(--paper-width);
        min-height: 0;
        height: var(--paper-height);
        margin: 0;
        box-shadow: none;
        page-break-after: auto;
      }

      .seat:focus {
        border-color: var(--fg);
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="controls">
      <div class="controls-header">
        <h1>Seat Map Generator</h1>
        <p>레이아웃을 만든 뒤 바로 수정하고 PocketBase에 저장할 수 있습니다. 기존 저장본은 index 또는 ?id= 링크로 다시 열립니다.</p>
      </div>

      <div class="stack">
        <section class="panel">
          <h2>PocketBase 로그인</h2>
          <div class="login-only">
            <div class="auth-grid">
              <div class="field">
                <label for="emailInput">이메일</label>
                <input id="emailInput" type="email" placeholder="you@example.com">
              </div>
              <div class="field">
                <label for="passwordInput">비밀번호</label>
                <input id="passwordInput" type="password" placeholder="••••••••">
              </div>
            </div>
            <div class="auth-actions">
              <button class="btn btn-primary" id="loginButton" type="button">로그인</button>
            </div>
          </div>
          <div class="auth-actions auth-only">
            <button class="btn btn-secondary" id="logoutButton" type="button">로그아웃</button>
          </div>
          <div class="record-meta" id="authMessage">로그인하면 저장 버튼이 활성화됩니다.</div>
        </section>

        <section class="panel">
          <h2>파일</h2>
          <div class="top-links">
            <a class="btn btn-secondary" href="./index.html">목록으로</a>
            <a class="btn btn-primary" href="./generator.html">새 seatmap</a>
          </div>
          <div class="record-meta" id="recordMeta">새 seatmap을 만드는 중입니다.</div>
        </section>

        <section class="panel">
          <h2>레이아웃</h2>
          <div class="field">
            <label for="titleInput">제목</label>
            <input id="titleInput" type="text" value="2025-33 New Venture Creation (201)">
          </div>

          <div class="field">
            <label for="podiumInput">Podium 라벨</label>
            <input id="podiumInput" type="text" value="Podium">
          </div>

          <div class="field">
            <label for="leftCountsInput">왼쪽 좌석 수 (쉼표 구분)</label>
            <input id="leftCountsInput" type="text" value="3,6,8,9,7">
          </div>

          <div class="field">
            <label for="rightCountsInput">오른쪽 좌석 수 (쉼표 구분)</label>
            <input id="rightCountsInput" type="text" value="2,6,8,9,6">
          </div>

          <div class="size-grid">
            <div class="field">
              <label for="aisleWidthInput">복도 폭 (in)</label>
              <input id="aisleWidthInput" type="number" step="0.01" min="0.2" value="0.36">
            </div>
            <div class="field">
              <label for="seatWidthInput">좌석 폭 (in)</label>
              <input id="seatWidthInput" type="number" step="0.01" min="0.2" value="0.52">
            </div>
            <div class="field">
              <label for="seatHeightInput">좌석 높이 (in)</label>
              <input id="seatHeightInput" type="number" step="0.01" min="0.2" value="0.34">
            </div>
            <div class="field">
              <label for="seatGapInput">좌석 간격 (in)</label>
              <input id="seatGapInput" type="number" step="0.01" min="0.01" value="0.04">
            </div>
            <div class="field">
              <label for="rowGapInput">행 간격 (in)</label>
              <input id="rowGapInput" type="number" step="0.01" min="0.05" value="0.27">
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>이름 입력</h2>
          <div class="field">
            <label for="namesInput">이름 목록 (한 줄에 한 명, 자동 채우기용)</label>
            <textarea id="namesInput" placeholder="홍길동&#10;김영희&#10;..."></textarea>
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="renderButton" type="button">레이아웃 생성</button>
            <button class="btn btn-secondary" id="fillNamesButton" type="button">이름 채우기</button>
            <button class="btn btn-secondary" id="clearSeatButton" type="button">좌석 비우기</button>
            <button class="btn btn-secondary" id="printButton" type="button">인쇄</button>
            <button class="btn btn-primary" id="saveButton" type="button">저장</button>
          </div>

          <div class="status" id="statusMessage" aria-live="polite"></div>
        </section>
      </div>
    </aside>

    <section class="preview-wrap">
      <main class="sheet" id="sheet">
        <h2 class="title" id="sheetTitle"></h2>
        <div class="podium" id="podiumLabel"></div>
        <div class="rows" id="rows"></div>
      </main>
    </section>
  </div>

  <script src="./seatmap-app.js"></script>
  <script>
    const ui = {
      authPanel: document.querySelector(".panel"),
      authMessage: document.getElementById("authMessage"),
      emailInput: document.getElementById("emailInput"),
      passwordInput: document.getElementById("passwordInput"),
      loginButton: document.getElementById("loginButton"),
      logoutButton: document.getElementById("logoutButton"),
      recordMeta: document.getElementById("recordMeta"),
      titleInput: document.getElementById("titleInput"),
      podiumInput: document.getElementById("podiumInput"),
      leftCountsInput: document.getElementById("leftCountsInput"),
      rightCountsInput: document.getElementById("rightCountsInput"),
      aisleWidthInput: document.getElementById("aisleWidthInput"),
      seatWidthInput: document.getElementById("seatWidthInput"),
      seatHeightInput: document.getElementById("seatHeightInput"),
      seatGapInput: document.getElementById("seatGapInput"),
      rowGapInput: document.getElementById("rowGapInput"),
      namesInput: document.getElementById("namesInput"),
      renderButton: document.getElementById("renderButton"),
      fillNamesButton: document.getElementById("fillNamesButton"),
      clearSeatButton: document.getElementById("clearSeatButton"),
      printButton: document.getElementById("printButton"),
      saveButton: document.getElementById("saveButton"),
      statusMessage: document.getElementById("statusMessage"),
      sheetTitle: document.getElementById("sheetTitle"),
      podiumLabel: document.getElementById("podiumLabel"),
      rows: document.getElementById("rows")
    };

    const rootStyle = document.documentElement.style;
    const params = new URLSearchParams(window.location.search);
    let currentRecordId = params.get("id");

    function parseCounts(inputValue) {
      return inputValue
        .split(",")
        .map((item) => item.trim())
        .filter((item) => item.length > 0)
        .map((item) => Number(item))
        .filter((item) => Number.isInteger(item) && item >= 0);
    }

    function normalizeCounts(leftCounts, rightCounts) {
      const rowCount = Math.max(leftCounts.length, rightCounts.length);
      if (rowCount === 0) {
        return {
          left: [0],
          right: [0],
          message: "좌석 수를 읽지 못해 기본값 0행으로 생성했습니다."
        };
      }

      const left = Array.from({ length: rowCount }, (_, idx) => leftCounts[idx] ?? 0);
      const right = Array.from({ length: rowCount }, (_, idx) => rightCounts[idx] ?? 0);
      const message = leftCounts.length === rightCounts.length
        ? ""
        : "왼쪽/오른쪽 행 개수가 달라 부족한 값은 0으로 채웠습니다.";

      return { left, right, message };
    }

    function createSeat() {
      const seat = document.createElement("div");
      seat.className = "seat";
      seat.contentEditable = "true";
      seat.spellcheck = false;
      seat.setAttribute("role", "textbox");
      seat.setAttribute("aria-label", "좌석 이름 입력");
      return seat;
    }

    function applyDimensions(dimensions) {
      rootStyle.setProperty("--aisle-width", `${Number(dimensions.aisleWidth) || 0.36}in`);
      rootStyle.setProperty("--seat-width", `${Number(dimensions.seatWidth) || 0.52}in`);
      rootStyle.setProperty("--seat-height", `${Number(dimensions.seatHeight) || 0.34}in`);
      rootStyle.setProperty("--seat-gap", `${Number(dimensions.seatGap) || 0.04}in`);
      rootStyle.setProperty("--row-gap", `${Number(dimensions.rowGap) || 0.27}in`);
    }

    function renderLayout(options) {
      const settings = options || {};
      const title = settings.title || ui.titleInput.value.trim() || "Untitled";
      const podiumText = settings.podiumLabel || ui.podiumInput.value.trim() || "Podium";
      const leftCounts = settings.leftCounts || parseCounts(ui.leftCountsInput.value);
      const rightCounts = settings.rightCounts || parseCounts(ui.rightCountsInput.value);
      const normalized = normalizeCounts(leftCounts, rightCounts);
      const dimensions = settings.dimensions || {
        aisleWidth: Number(ui.aisleWidthInput.value) || 0.36,
        seatWidth: Number(ui.seatWidthInput.value) || 0.52,
        seatHeight: Number(ui.seatHeightInput.value) || 0.34,
        seatGap: Number(ui.seatGapInput.value) || 0.04,
        rowGap: Number(ui.rowGapInput.value) || 0.27
      };

      applyDimensions(dimensions);
      ui.sheetTitle.textContent = title;
      ui.podiumLabel.textContent = podiumText;
      ui.rows.innerHTML = "";

      normalized.left.forEach((leftCount, rowIndex) => {
        const rightCount = normalized.right[rowIndex];
        const row = document.createElement("div");
        row.className = "row";

        const leftBlock = document.createElement("div");
        leftBlock.className = "block left";
        for (let i = 0; i < leftCount; i += 1) {
          leftBlock.appendChild(createSeat());
        }

        const aisle = document.createElement("div");
        aisle.setAttribute("aria-hidden", "true");

        const rightBlock = document.createElement("div");
        rightBlock.className = "block right";
        for (let i = 0; i < rightCount; i += 1) {
          rightBlock.appendChild(createSeat());
        }

        row.append(leftBlock, aisle, rightBlock);
        ui.rows.appendChild(row);
      });

      if (settings.rows) {
        applySeatRows(settings.rows);
      }

      ui.statusMessage.textContent = settings.message || normalized.message || "레이아웃을 생성했습니다.";
    }

    function collectSeatsByRowAisleFirst() {
      const rowElements = Array.from(ui.rows.querySelectorAll(".row"));
      const orderedSeats = [];

      rowElements.forEach((row) => {
        const leftSeats = Array.from(row.querySelectorAll(".block.left .seat")).reverse();
        const rightSeats = Array.from(row.querySelectorAll(".block.right .seat"));
        orderedSeats.push(...leftSeats, ...rightSeats);
      });

      return orderedSeats;
    }

    function snapshotSeatRows() {
      return Array.from(ui.rows.querySelectorAll(".row")).map((row) => ({
        left: Array.from(row.querySelectorAll(".block.left .seat")).map((seat) => seat.textContent.trim()),
        right: Array.from(row.querySelectorAll(".block.right .seat")).map((seat) => seat.textContent.trim())
      }));
    }

    function applySeatRows(rows) {
      const rowElements = Array.from(ui.rows.querySelectorAll(".row"));
      rowElements.forEach((rowElement, rowIndex) => {
        const rowData = rows[rowIndex] || { left: [], right: [] };
        const leftSeats = Array.from(rowElement.querySelectorAll(".block.left .seat"));
        const rightSeats = Array.from(rowElement.querySelectorAll(".block.right .seat"));

        leftSeats.forEach((seat, seatIndex) => {
          seat.textContent = rowData.left[seatIndex] || "";
        });
        rightSeats.forEach((seat, seatIndex) => {
          seat.textContent = rowData.right[seatIndex] || "";
        });
      });
    }

    function fillNames() {
      const names = ui.namesInput.value
        .split("\n")
        .map((line) => line.trim())
        .filter((line) => line.length > 0);

      const seats = collectSeatsByRowAisleFirst();
      seats.forEach((seat, idx) => {
        seat.textContent = names[idx] || "";
      });

      const filled = Math.min(names.length, seats.length);
      const remainder = names.length > seats.length
        ? ` / ${names.length - seats.length}명은 좌석이 부족해 반영되지 않았습니다.`
        : "";
      ui.statusMessage.textContent = `${filled}개 좌석에 이름을 채웠습니다${remainder}`;
    }

    function clearSeats() {
      const seats = ui.rows.querySelectorAll(".seat");
      seats.forEach((seat) => {
        seat.textContent = "";
      });
      ui.statusMessage.textContent = "좌석 내용을 모두 비웠습니다.";
    }

    function setAuthMessage(message) {
      ui.authMessage.textContent = message;
    }

    function setAuthUi(auth) {
      ui.authPanel.classList.toggle("is-authenticated", Boolean(auth));
    }

    function updateRecordMeta(record) {
      if (!record) {
        ui.recordMeta.textContent = "새 seatmap을 만드는 중입니다.";
        return;
      }

      ui.recordMeta.textContent = `현재 record: ${record.id} / 마지막 수정 ${record.updatedAt || record.createdAt || record.updated || record.created ? SeatmapApp.formatDate(record.updatedAt || record.createdAt || record.updated || record.created) : "시간 정보 없음"}`;
    }

    function updateSaveButtonState() {
      const auth = SeatmapApp.getStoredAuth();
      ui.saveButton.disabled = !auth;
    }

    function buildPayload() {
      const leftCounts = parseCounts(ui.leftCountsInput.value);
      const rightCounts = parseCounts(ui.rightCountsInput.value);
      const normalized = normalizeCounts(leftCounts, rightCounts);
      const rows = snapshotSeatRows();
      const seatCount = rows.reduce((sum, row) => sum + row.left.length + row.right.length, 0);

      return {
        title: ui.titleInput.value.trim() || "Untitled",
        podiumLabel: ui.podiumInput.value.trim() || "Podium",
        rowCount: normalized.left.length,
        seatCount,
        layout: {
          leftCounts: normalized.left,
          rightCounts: normalized.right,
          dimensions: {
            aisleWidth: Number(ui.aisleWidthInput.value) || 0.36,
            seatWidth: Number(ui.seatWidthInput.value) || 0.52,
            seatHeight: Number(ui.seatHeightInput.value) || 0.34,
            seatGap: Number(ui.seatGapInput.value) || 0.04,
            rowGap: Number(ui.rowGapInput.value) || 0.27
          },
          rows
        }
      };
    }

    function applyRecord(record) {
      const layout = record.layout || {};
      ui.titleInput.value = record.title || "";
      ui.podiumInput.value = record.podiumLabel || "Podium";
      ui.leftCountsInput.value = (layout.leftCounts || []).join(",");
      ui.rightCountsInput.value = (layout.rightCounts || []).join(",");
      ui.aisleWidthInput.value = layout.dimensions && layout.dimensions.aisleWidth ? layout.dimensions.aisleWidth : 0.36;
      ui.seatWidthInput.value = layout.dimensions && layout.dimensions.seatWidth ? layout.dimensions.seatWidth : 0.52;
      ui.seatHeightInput.value = layout.dimensions && layout.dimensions.seatHeight ? layout.dimensions.seatHeight : 0.34;
      ui.seatGapInput.value = layout.dimensions && layout.dimensions.seatGap ? layout.dimensions.seatGap : 0.04;
      ui.rowGapInput.value = layout.dimensions && layout.dimensions.rowGap ? layout.dimensions.rowGap : 0.27;

      renderLayout({
        title: record.title,
        podiumLabel: record.podiumLabel,
        leftCounts: layout.leftCounts || [],
        rightCounts: layout.rightCounts || [],
        dimensions: layout.dimensions || {},
        rows: layout.rows || [],
        message: "저장된 seatmap을 불러왔습니다."
      });

      updateRecordMeta(record);
    }

    async function loadCurrentRecord() {
      if (!currentRecordId) {
        renderLayout();
        updateRecordMeta(null);
        return;
      }

      const auth = SeatmapApp.getStoredAuth();
      if (!auth) {
        renderLayout();
        ui.statusMessage.textContent = "기존 seatmap을 불러오려면 먼저 로그인해야 합니다.";
        return;
      }

      const record = await SeatmapApp.getSeatmap(currentRecordId);
      applyRecord(record);
    }

    ui.renderButton.addEventListener("click", () => renderLayout());
    ui.fillNamesButton.addEventListener("click", fillNames);
    ui.clearSeatButton.addEventListener("click", clearSeats);
    ui.printButton.addEventListener("click", () => window.print());

    ui.loginButton.addEventListener("click", async () => {
      try {
        const auth = await SeatmapApp.login(ui.emailInput.value.trim(), ui.passwordInput.value);
        setAuthUi(auth);
        setAuthMessage(`${auth.record.email} 계정으로 로그인되었습니다.`);
        updateSaveButtonState();
        await loadCurrentRecord();
      } catch (error) {
        setAuthMessage(error.message || "로그인에 실패했습니다.");
      }
    });

    ui.logoutButton.addEventListener("click", () => {
      SeatmapApp.logout();
      setAuthUi(null);
      updateSaveButtonState();
      setAuthMessage("로그아웃했습니다.");
      if (currentRecordId) {
        ui.statusMessage.textContent = "로그아웃되어 저장본을 더 이상 불러올 수 없습니다.";
      }
    });

    ui.saveButton.addEventListener("click", async () => {
      try {
        const payload = buildPayload();
        const saved = await SeatmapApp.saveSeatmap(payload, currentRecordId);
        currentRecordId = saved.id;
        const url = new URL(window.location.href);
        url.searchParams.set("id", currentRecordId);
        window.history.replaceState({}, "", url);
        updateRecordMeta(saved);
        ui.statusMessage.textContent = currentRecordId === saved.id
          ? "PocketBase에 저장했습니다. 같은 URL로 다시 수정할 수 있습니다."
          : "PocketBase에 새 seatmap을 저장했습니다.";
      } catch (error) {
        ui.statusMessage.textContent = error.message || "저장에 실패했습니다.";
      }
    });

    (async () => {
      try {
        const auth = await SeatmapApp.verifyAuth();
        if (auth) {
          setAuthUi(auth);
          setAuthMessage(`${auth.record.email} 계정으로 로그인되어 있습니다.`);
        } else {
          setAuthUi(null);
        }
        updateSaveButtonState();
        await loadCurrentRecord();
      } catch (error) {
        renderLayout();
        setAuthUi(null);
        setAuthMessage(error.message || "PocketBase 연결에 실패했습니다.");
        updateSaveButtonState();
      }
    })();
  </script>
</body>
</html>
